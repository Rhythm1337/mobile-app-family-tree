name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Android project scaffold
        run: |
          if [ ! -f "android-app/gradlew" ]; then
            echo "::error::Missing android-app/gradlew. Initialize a full Android project in android-app first."
            exit 1
          fi
          if [ ! -f "android-app/app/build.gradle" ] && [ ! -f "android-app/app/build.gradle.kts" ]; then
            echo "::error::Missing app module Gradle file in android-app/app/."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x android-app/gradlew

      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android-app/app/build/outputs/apk/debug/*.apk
